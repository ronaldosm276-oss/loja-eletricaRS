<!DOCTYPE html>
<html lang="pt-br">

<head>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS ELÉTRICA</title>
    <link rel="shortcut icon" href="../imagens/icon/logo.ico" type="image/x-icon">

    <link rel="stylesheet" href="../css/style_estrutura_paginas.css">
    <link rel="stylesheet" href="../css/style_formulario.css">


</head>

<body>

    <main id="geral">
        <header id="cabecalho">
            <div id="logo" class="logo">
                <a href="../index.html">
                    <img src="../image/icon/logo.png" alt="" id="logo">
                </a>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html" class="lnk_menu"> Home </a></li>
                    <li><a href="cadastro.html" class="lnk_menu"> Cadastro </a></li>
                    <li><a href="sobre.html" class="lnk_menu"> Sobre </a></li>

                </ul>
            </nav>


            <div id="div-icones">
                <ul>

                    <li><a href="login.html" class="lnk_icone"> <img src="../image/icon/login.png" alt=""
                                class="lnk_icone"> </a></li>

                    <li><a href="carrinho.html" class="lnk_icone"><img src="../image/icon/carrinho.png" alt=""
                                class="lnk_icone"></a></li>

                </ul>

            </div>

        </header>
        <section id="pesquisa">
            <input type="text" name="pesquisa" id="pesquisa" placeholder="Digite seu produto">
        </section>

        <section id="formulario">
            <h3>Cadastro</h3>

            <form action="" id="form-pessoa">

                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome" class="input01" required maxlength="60"
                    placeholder="Digite seu nome">

                <label for="nome">CPF</label>
                <input type="text" name="nome" id="cpf" class="input01" required maxlength="14"
                    placeholder="Digite seu CPF">

                <label for="data-nascimento">Data</label>
                <input type="date" name="data-nascimento" id="data-nascimento" class="input02" required
                    placeholder="Digite seu nome">


                <label for="sexo">SEXO</label>
                <input type="radio" name="sexo" id="sexoM" class="InputOP" value="M">Masculino
                <input type="radio" name="sexo" id="sexoF" class="InputOP" value="F">Feminino
                <input type="radio" name="sexo" id="sexoN" class="InputOP" value="N">Não Declarar

                <label for="CEP">CEP</label>
                <input type="text" name="CEP" id="CEP" class="input02" required maxlength="9"
                    placeholder="Digite seu CEP">



                <div id="div-dados-endereco" class="oculto">

                    <label for="logradouro">Logradouro</label>
                    <input type="text" name="logradouro" id="logradouro" class="input01" required>

                    <label for="Número">Número</label>
                    <input type="text" name="Número" id="Número" class="input02" required maxlength="10"
                        placeholder="digite o número da residência">

                    <label for="complemento-end">Complemento</label>
                    <input type="text" name="complemento-end" id="complemento-end" class="input02" maxlength="100"
                        placeholder="Complemento">

                    <label for="bairro">Bairro</label>
                    <input type="text" name="bairro" id="bairro" class="input01" required>

                    <label for="localidade">Localidade</label>
                    <input type="text" name="localidade" id="localidade" class="input01" required>

                    <label for="uf">UF</label>
                    <input type="text" name="uf" id="uf" class="input02" required>

                </div>


                <label for="senha">SENHA</label>
                <input type="password" name="senha" id="senha" class="input02" required maxlength="6"
                    placeholder="informe a senha">

                <div id="div-btns">
                    <button type="submit" id="btn-add">CADASTRAR</button>
                    <button type="reset" id="btn-limpar">LIMPAR</button>
                </div>

            </form>
        </section>



        <footer id="rodape">
            <div id="dadosloja">
                <h2>Rua ABC - Industrial 987 - Polo Sul</h2>
                <h1>Terra de Ninguém; Antártida </h1>
            </div>

            <div id="icones-sociais">
                <ul>
                    <li><a href="coloqueumlinkINSTAGRAMaqui"><img src="../image/icon/instagram.png" alt=""></a></li>
                    <li><a href="coloqueumlinkFACEBOOKaqui"><img src="../image/icon/facebook.png" alt=""></a></li>
                </ul>
            </div>

            <div id="div-cartoes">
                <img src="../image/icon/pagamentos.jpg" alt="">
            </div>

        </footer>


    </main>

</body>

</html>
