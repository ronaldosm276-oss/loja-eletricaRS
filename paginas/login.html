<!DOCTYPE html>
<html lang="pt-br">

<head>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS ELÉTRICA</title>
    <link rel="shortcut icon" href="../imagens/icon/logo.ico" type="image/x-icon">

    <link rel="stylesheet" href="../css/style_estrutura_paginas.css">
    <link rel="stylesheet" href="../css/style_formulario.css">
    <script src="../js/cadastro_login.js" defer></script>

</head>

<body>

    <main id="geral">
        <header id="cabecalho">
            <div id="logo" class="logo">
                <a href="../index.html">
                    <img src="../image/icon/logo.png" alt="" id="logo">
                </a>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html" class="lnk_menu"> Home </a></li>
                    <li><a href="cadastro.html" class="lnk_menu"> Cadastro </a></li>
                    <li><a href="sobre.html" class="lnk_menu"> Sobre </a></li>

                </ul>
            </nav>


            <div id="div-icones">
                <ul>

                    <li><a href="login.html" class="lnk_icone"> <img src="../image/icon/login.png" alt=""
                                class="lnk_icone"> </a></li>

                    <li><a href="carrinho.html" class="lnk_icone"><img src="../image/icon/carrinho.png" alt=""
                                class="lnk_icone"></a></li>

                </ul>

            </div>

        </header>
        <section id="pesquisa">
            <input type="text" name="pesquisa" id="pesquisa" placeholder="Digite seu produto">
        </section>

        <h3>Esta é a página de login</h3>

        <form action="" id="login">

            <label for="nome">CPF</label>
            <input type="text" name="nome" id="cpf" class="input01" required maxlength="14"
                placeholder="Digite seu CPF">

            <label for="nome">SENHA</label>
            <input type="password" name="nome" id="senha" class="input01" required maxlength="6"
                placeholder="Digite sua senha">

                <button type="submit">Fazer Login</button>
        </form>

        <a href="cadastro.html" id="lnk_Cadastro">Faça seu cadastro</a>


        <footer id="rodape">
            <div id="dadosloja">
                <h2>Rua ABC - Industrial 987 - Polo Sul</h2>
                <h1>Terra de Ninguém; Antártida </h1>
            </div>

            <div id="icones-sociais">
                <ul>
                    <li><a href="coloqueumlinkINSTAGRAMaqui"><img src="../image/icon/instagram.png" alt=""></a></li>
                    <li><a href="coloqueumlinkFACEBOOKaqui"><img src="../image/icon/facebook.png" alt=""></a></li>
                </ul>
            </div>

            <div id="div-cartoes">
                <img src="../image/icon/pagamentos.jpg" alt="">
            </div>

        </footer>


    </main>

</body>

</html>
