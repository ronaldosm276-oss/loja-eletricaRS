<!DOCTYPE html>
<html lang="pt-br">

<head>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS ELÉTRICA</title>
    <link rel="shortcut icon" href="../imagens/icon/logo.ico" type="image/x-icon">

    <link rel="stylesheet" href="../css/style_estrutura_paginas.css">
    <link rel="stylesheet" href="../css/style_formulario.css">
    <link rel="stylesheet" href="../css/style_carrinho.css">

    <script src="../js/carrinho.js"></script>
    

</head>

<body>

    <main id="geral">

        <header id="cabecalho">
            <div id="logo" class="logo">
                <a href="../index.html">
                    <img src="../image/icon/logo.png" alt="" id="logo">
                </a>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html" class="lnk_menu"> Home </a></li>
                    <li><a href="cadastro.html" class="lnk_menu"> Cadastro </a></li>
                    <li><a href="sobre.html" class="lnk_menu"> Sobre </a></li>
                </ul>
            </nav>


            <div id="div-icones">
                <ul>

                    <li><a href="login.html" class="lnk_icone"> <img src="../image/icon/login.png" alt=""
                                class="lnk_icone"> </a></li>

                    <li><a href="carrinho.html" class="lnk_icone"><img src="../image/icon/carrinho.png" alt=""
                                class="lnk_icone"></a></li>

                </ul>

            </div>

        </header>
        <section id="pesquisa">
            <input type="text" name="pesquisa" id="pesquisa" placeholder="Digite seu produto">
        </section>


            <h3>Esta é a página do carrinho</h3>
            <section id="compras">

                <div id="carrinhoCompras">
                    <table class="tabela-carrinho">
                        <thead>
                            <tr>
                                <th colspan="2">Produto</th>
                                <th>Quantidade</th>
                                <th>Preço Unitário</th>
                                <th>Total</th>
                                <th>Excluir</th>
                            </tr>
                        </thead>
                        <tbody id="itens-carrinho">
                            </tbody>
                    </table>
                    
                    <div id="carrinho-vazio" style="display: none; text-align: center; padding: 20px; color: #777;">
                        Seu carrinho está vazio.
                    </div>
                </div>
    
                <div id="lateral">
    
                    <div id="cep">
                        <label for="input-cep">Calcular Frete:</label>
                        <div class="Agrupa-cep">
                            <input type="text" id="input-cep" placeholder="00000-000" maxlength="9">
                            <button type="button" id="btn-calcular-frete" class="btn-cep">Calcular</button>
                        </div>
                    </div>
    
                    <div id="valores">
                        <div class="linha-valor">
                            <span>Subtotal:</span>
                            <span id="valor-subtotal">R$ 0,00</span>
                        </div>
                        <div class="linha-valor">
                            <span>Frete:</span>
                            <span id="valor-frete" class="valor-verde">R$ 0,00</span>
                        </div>
                        <hr class="divisor-valores">
                        <div class="linha-valor total">
                            <span>Total:</span>
                            <span id="valor-total">R$ 0,00</span>
                        </div>
                    </div>
    
                    <div id="botoes">
                        <a href="../index.html" class="btn-continuar">CONTINUAR COMPRA</a>
                        <button type="button" id="btn-finalizar-compra" class="btn-finalizar">FINALIZAR COMPRA</button>
                    </div>
    
                </div>
    
            </section>






        <footer id="rodape">
            <div id="dadosloja">
                <h2>Rua ABC - Industrial 987 - Polo Sul</h2>
                <h1>Terra de Ninguém; Antártida </h1>
            </div>

            <div id="icones-sociais">
                <ul>
                    <li><a href="coloqueumlinkINSTAGRAMaqui"><img src="../image/icon/instagram.png" alt=""></a></li>
                    <li><a href="coloqueumlinkFACEBOOKaqui"><img src="../image/icon/facebook.png" alt=""></a></li>
                </ul>
            </div>

            <div id="div-cartoes">
                <img src="../image/icon/pagamentos.jpg" alt="">
            </div>

        </footer>


    </main>

</body>

</html>
